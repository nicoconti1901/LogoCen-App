<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="42%" stop-color="#132238"/>
      <stop offset="100%" stop-color="#0c1a2f"/>
    </linearGradient>

    <radialGradient id="a" cx="16%" cy="20%" r="42%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b" cx="84%" cy="20%" r="38%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c" cx="50%" cy="92%" r="48%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#a)"/>
  <rect width="1920" height="1080" fill="url(#b)"/>
  <rect width="1920" height="1080" fill="url(#c)"/>

